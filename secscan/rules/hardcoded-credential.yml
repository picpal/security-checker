rules:
  - id: hardcoded-credential
    languages: [java]
    severity: ERROR
    message: >-
      하드코딩된 자격증명입니다(CWE-798/259). 환경변수·시크릿 매니저·설정 외부화로
      옮기고, 이미 노출된 값은 회수(revoke)·교체하세요.
    metadata:
      cwe:
        - "CWE-798"
        - "CWE-259"
      confidence: HIGH
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
    patterns:
      - pattern: $T $VAR = "...";
      # 자격증명류 변수명만 (env/@Value/메서드 주입은 우변이 리터럴이 아니라 자동 제외)
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|apikey|api_key|token|credential)
      # 빈 문자열은 자격증명 아님
      - pattern-not: $T $VAR = "";
